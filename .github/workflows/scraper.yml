name: Scraper

# Runs on a schedule and on demand, then commits the refreshed data files.
on:
  schedule:
    - cron: "0 1 * * *"      # daily at 01:00 UTC (08:00 Vietnam time)
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max listing pages to crawl (0 = until empty)"
        required: false
        default: "6"

permissions:
  contents: write            # needed to commit the output files back

jobs:
  scrape:
    runs-on: ubuntu-latest
   

    env:
      CO_MAX_PAGES: ${{ github.event.inputs.max_pages || '6' }}
      CO_DELAY: "1.0"
      CO_OUT_CSV: "careerone_jobs.csv"
      CO_OUT_XLSX: "careerone_jobs.xlsx"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python vn.py

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add careerone_jobs.csv careerone_jobs.xlsx processed_urls.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh CareerONE jobs ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: careerone-jobs
          path: |
            careerone_jobs.csv
            careerone_jobs.xlsx
          if-no-files-found: ignore
